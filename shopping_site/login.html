<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart — Sign In</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

<div class="auth-split">
    <!-- Left decorative panel -->
    <div class="auth-panel-left">
        <a href="index.html" class="logo auth-logo">Nova<span>Mart</span></a>
        <p class="auth-tagline">Modern commerce,<br>refined experience.</p>
    </div>

    <!-- Right form panel -->
    <div class="auth-panel-right">
        <div class="auth-card">
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your account</p>

            <div class="auth-error" id="loginError" style="display:none"></div>

            <form id="loginForm" novalidate>
                <input type="hidden" name="_csrf" id="csrfToken" />

                <div class="auth-field">
                    <label for="loginEmail">Email address</label>
                    <input type="email" id="loginEmail" name="email"
                           autocomplete="email" maxlength="120"
                           placeholder="you@example.com" required />
                    <span class="field-err" id="errEmail"></span>
                </div>

                <div class="auth-field">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password"
                           autocomplete="current-password" maxlength="128"
                           placeholder="••••••••" required />
                    <span class="field-err" id="errPassword"></span>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
            </form>

            <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Store</a></p>
        </div>
    </div>
</div>

<script src="js/auth-common.js"></script>
<script src="js/login-page.js"></script>
</body>
</html>
