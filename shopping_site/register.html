<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NovaMart — Register</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

<div class="auth-split">
    <div class="auth-panel-left">
        <a href="index.html" class="logo auth-logo">Nova<span>Mart</span></a>
        <p class="auth-tagline">Join the community.<br>Shop with confidence.</p>
    </div>

    <div class="auth-panel-right">
        <div class="auth-card">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-subtitle">Start shopping today</p>

            <div class="auth-error" id="regError" style="display:none"></div>
            <div class="auth-success" id="regSuccess" style="display:none"></div>

            <form id="registerForm" novalidate>
                <input type="hidden" name="_csrf" id="csrfToken" />

                <div class="auth-field">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" name="name"
                           autocomplete="name" maxlength="80"
                           placeholder="Jane Doe" required />
                    <span class="field-err" id="errName"></span>
                </div>

                <div class="auth-field">
                    <label for="regEmail">Email address</label>
                    <input type="email" id="regEmail" name="email"
                           autocomplete="email" maxlength="120"
                           placeholder="you@example.com" required />
                    <span class="field-err" id="errEmail"></span>
                </div>

                <div class="auth-field">
                    <label for="regPassword">Password
                        <small>(min 8 chars, 1 uppercase, 1 digit)</small>
                    </label>
                    <input type="password" id="regPassword" name="password"
                           autocomplete="new-password" maxlength="128"
                           placeholder="••••••••" required />
                    <span class="field-err" id="errPassword"></span>
                </div>

                <div class="auth-field">
                    <label for="regConfirm">Confirm Password</label>
                    <input type="password" id="regConfirm" name="confirm"
                           autocomplete="new-password" maxlength="128"
                           placeholder="••••••••" required />
                    <span class="field-err" id="errConfirm"></span>
                </div>

                <button type="submit" class="auth-btn" id="regBtn">Create Account</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Store</a></p>
        </div>
    </div>
</div>

<script src="js/auth-common.js"></script>
<script src="js/register-page.js"></script>
</body>
</html>
